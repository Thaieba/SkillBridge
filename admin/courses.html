<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Manage Courses | SkillBridge</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    /* Table & Card layout styling overrides */
    .admin-table { 
      width:100%; 
      border-collapse:collapse; 
      background:var(--card-bg); 
      border-radius:12px; 
      overflow:hidden; 
      box-shadow:0 4px 20px rgba(0,0,0,0.08); 
      border: 1px solid var(--border-color);
    }
    .admin-table th { 
      background:linear-gradient(135deg,var(--primary-color),var(--secondary-color)); 
      color:#fff; 
      padding:1rem 1.2rem; 
      text-align:left; 
      font-size:0.9rem; 
      letter-spacing:.04em; 
    }
    .admin-table td { 
      padding:.9rem 1.2rem; 
      border-bottom:1px solid var(--border-color); 
      color:var(--text-dark); 
      vertical-align:middle; 
    }
    .admin-table tr:last-child td { 
      border-bottom:none; 
    }
    .admin-table tr:hover td { 
      background:rgba(99,102,241,.05); 
    }
    .tag { 
      display:inline-block; 
      padding:.2rem .6rem; 
      border-radius:20px; 
      font-size:.78rem; 
      font-weight:700; 
      background:rgba(16,185,129,0.1); 
      color:var(--primary-color); 
      border: 1px solid rgba(16,185,129,0.15);
    }
    .btn-edit { 
      background:linear-gradient(135deg,#6366f1,#8b5cf6); 
      color:#fff; 
      border:none; 
      padding:.45rem .9rem; 
      border-radius:8px; 
      cursor:pointer; 
      font-size:.82rem; 
      font-weight:600; 
      transition:opacity .2s; 
    }
    .btn-del { 
      background:linear-gradient(135deg,#ef4444,#dc2626); 
      color:#fff; 
      border:none; 
      padding:.45rem .9rem; 
      border-radius:8px; 
      cursor:pointer; 
      font-size:.82rem; 
      font-weight:600; 
      transition:opacity .2s; 
    }
    .btn-edit:hover, .btn-del:hover { 
      opacity:.85; 
    }

    /* Modal Overlay & Box styling */
    .modal-overlay { 
      display:none; 
      position:fixed; 
      inset:0; 
      background:rgba(0,0,0,.6); 
      backdrop-filter:blur(4px); 
      z-index:1000; 
      align-items:center; 
      justify-content:center; 
    }
    .modal-overlay.open { 
      display:flex; 
    }
    .modal-box { 
      background:var(--card-bg); 
      border-radius:16px; 
      padding:2rem; 
      width:min(680px,95vw); 
      max-height:90vh; 
      overflow-y:auto; 
      box-shadow:0 20px 60px rgba(0,0,0,.25); 
      border: 1px solid var(--border-color);
    }
    .modal-box h2 { 
      margin-bottom:1.5rem; 
      font-size:1.4rem; 
      font-weight: 850;
      color: var(--text-dark);
    }

    /* Form Design */
    .form-row { 
      display:grid; 
      grid-template-columns:1fr 1fr; 
      gap:1rem; 
    }
    @media (max-width: 576px) {
      .form-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
    }
    .form-field { 
      display:flex; 
      flex-direction:column; 
      gap:.4rem; 
      margin-bottom:1rem; 
    }
    .form-field label { 
      font-size:.8rem; 
      font-weight:700; 
      color:var(--text-light); 
      text-transform:uppercase; 
      letter-spacing:.05em; 
    }
    .form-field input, .form-field select, .form-field textarea { 
      background:var(--bg-secondary); 
      border:1.5px solid var(--border-color); 
      border-radius:8px; 
      padding:.6rem .9rem; 
      color:var(--text-dark); 
      font-size:.95rem; 
      outline:none; 
      transition:border-color .2s; 
    }
    .form-field input:focus, .form-field select:focus, .form-field textarea:focus { 
      border-color:var(--primary-color); 
    }
    .form-field textarea { 
      resize:vertical; 
      min-height:80px; 
    }
    .modal-actions { 
      display:flex; 
      gap:1rem; 
      justify-content:flex-end; 
      margin-top:1.5rem; 
    }
    .btn-save { 
      background:linear-gradient(135deg,#10b981,#059669); 
      color:#fff; 
      border:none; 
      padding:.6rem 1.5rem; 
      border-radius:10px; 
      font-weight:700; 
      cursor:pointer; 
      transition: opacity 0.2s;
    }
    .btn-save:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      opacity: 0.6;
    }
    .btn-cancel { 
      background:rgba(100,100,100,.15); 
      color:var(--text-dark); 
      border:none; 
      padding:.6rem 1.5rem; 
      border-radius:10px; 
      font-weight:700; 
      cursor:pointer; 
    }

    /* Modal tabs styling */
    .modal-tabs {
      display: flex;
      border-bottom: 2px solid var(--border-color);
      margin-bottom: 1.25rem;
      gap: 0.5rem;
    }
    .modal-tab-btn {
      padding: 0.6rem 1.1rem;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 700;
      color: var(--text-light);
      font-size: 0.85rem;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .modal-tab-btn.active {
      color: var(--primary-color);
      border-bottom-color: var(--primary-color);
    }
    .tab-pane {
      display: none;
    }
    .tab-pane.active {
      display: block;
    }

    /* Controls filter row grid */
    .controls-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1.2fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
      align-items: center;
    }
    @media (max-width: 768px) {
      .controls-grid {
        grid-template-columns: 1fr;
      }
    }

    .form-control-select {
      width: 100%;
      padding:.6rem 1rem;
      border:1.5px solid var(--border-color);
      border-radius:10px;
      background:var(--card-bg);
      color:var(--text-dark);
      font-size:.9rem;
      outline:none;
    }
    .form-control-select:focus {
      border-color: var(--primary-color);
    }

    .search-bar { 
      width:100%; 
      padding:.6rem 1rem; 
      border:1.5px solid var(--border-color); 
      border-radius:10px; 
      font-size:.95rem; 
      background:var(--card-bg); 
      color:var(--text-dark); 
      outline:none; 
    }
    .search-bar:focus {
      border-color: var(--primary-color);
    }

    .empty-state { 
      text-align:center; 
      padding:3rem; 
      color:var(--text-light); 
      font-weight: 600;
    }

    /* KPI Stats cards */
    .stats-row { 
      display:grid; 
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); 
      gap:1rem; 
      margin-bottom:2rem; 
    }
    .stat-card { 
      background:var(--card-bg); 
      border-radius:12px; 
      padding:1.2rem 1.5rem; 
      border-left:4px solid var(--primary-color); 
      box-shadow:0 4px 15px rgba(0,0,0,0.04); 
      border: 1px solid var(--border-color);
      border-left: 4px solid var(--primary-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .stat-val { 
      font-size:2.2rem; 
      font-weight:800; 
      color:var(--text-dark); 
    }
    .stat-lbl { 
      font-size:.8rem; 
      color:var(--text-light); 
      margin-top:.2rem; 
      text-transform: uppercase;
      font-weight: 700;
    }
    .stat-icon {
      font-size: 2.2rem;
      opacity: 0.15;
    }

    /* JSON code editor styling */
    .json-editor {
      font-family: monospace;
      font-size: 0.85rem;
      background: #0f172a !important;
      color: #f8fafc !important;
      border-color: #334155 !important;
    }
    .json-control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
    }
    .json-validation-msg {
      font-size: 0.78rem;
      font-weight: 700;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a href="../index.html" class="logo">SkillBridge</a>
      <ul class="nav-links"></ul>
      <div class="hamburger"><span></span><span></span><span></span></div>
    </div>
  </nav>

  <section class="section" style="padding:2.5rem 1rem;">
    <div class="container" style="max-width:1200px;">
      
      <!-- Back Header -->
      <div style="margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;">
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <a href="dashboard.html" style="text-decoration: none; font-size: 1.4rem;" title="Back to Dashboard">⬅️</a>
          <h1 class="section-title" style="margin:0; font-size: 2rem;">📚 Manage Courses</h1>
        </div>
        <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="window.location.href='courses-manager.html'" style="padding:.6rem 1.4rem;font-weight:700;background:linear-gradient(135deg,#06b6d4,#0891b2);">📊 Course manager</button>
          <button class="btn btn-primary" onclick="openAddModal()" style="padding:.6rem 1.4rem;font-weight:700;">+ Add New Course</button>
        </div>
      </div>

      <!-- Stats Summary cards -->
      <div class="stats-row" id="statsRow"></div>

      <!-- Filters & Sorting controls -->
      <div class="controls-grid">
        <input class="search-bar" id="searchInput" placeholder="🔍 Search by course name, category, or description…" oninput="filterCourses()" />
        
        <select class="form-control-select" id="categoryFilter" onchange="filterCourses()">
          <!-- Populated dynamically -->
        </select>

        <select class="form-control-select" id="levelFilter" onchange="filterCourses()">
          <option value="all">All Levels</option>
          <option value="Beginner">Beginner</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Advanced">Advanced</option>
        </select>

        <select class="form-control-select" id="sortSelect" onchange="filterCourses()">
          <option value="titleAsc">Sort: Title (A-Z)</option>
          <option value="titleDesc">Sort: Title (Z-A)</option>
          <option value="compHigh">Sort: Completions (High)</option>
          <option value="ratingHigh">Sort: Rating (High)</option>
        </select>
      </div>

      <!-- Table View -->
      <div style="overflow-x:auto;">
        <table class="admin-table" id="coursesTable">
          <thead>
            <tr>
              <th>Icon</th>
              <th>Title</th>
              <th>Category</th>
              <th>Level</th>
              <th>Duration</th>
              <th>Rating</th>
              <th style="text-align:center;">Completions</th>
              <th style="text-align:center;">Actions</th>
            </tr>
          </thead>
          <tbody id="coursesTbody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- Add / Edit Tabbed Modal -->
  <div class="modal-overlay" id="courseModal">
    <div class="modal-box">
      <h2 id="modalTitle">Add Course</h2>
      <input type="hidden" id="editingId" value="" />

      <!-- Tabs Navigation -->
      <div class="modal-tabs">
        <button class="modal-tab-btn active" id="btnTabBasic" onclick="switchEditorTab('tab-basic')">1. Basic Info</button>
        <button class="modal-tab-btn" id="btnTabSyllabus" onclick="switchEditorTab('tab-syllabus')">2. Syllabus & Careers</button>
        <button class="modal-tab-btn" id="btnTabJSON" onclick="switchEditorTab('tab-json')">3. JSON Configurations</button>
      </div>

      <div id="modalAlert" style="color: #ef4444; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.15); padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.82rem; font-weight: 700; margin-bottom: 1rem; display: none;"></div>

      <!-- Tab 1: Basic Information -->
      <div class="tab-pane active" id="tab-basic">
        <div class="form-row">
          <div class="form-field">
            <label>Title *</label>
            <input id="fTitle" placeholder="e.g. Web Development" />
          </div>
          <div class="form-field">
            <label>Icon (Emoji)</label>
            <input id="fIcon" placeholder="🌐" maxlength="4" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>Category *</label>
            <input id="fCategory" placeholder="e.g. Frontend" />
          </div>
          <div class="form-field">
            <label>Level</label>
            <select id="fLevel">
              <option>Beginner</option>
              <option>Intermediate</option>
              <option>Advanced</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>Duration</label>
            <input id="fDuration" placeholder="e.g. 12 weeks" />
          </div>
          <div class="form-field">
            <label>Rating (0-5)</label>
            <input id="fRating" type="number" min="0" max="5" step="0.1" placeholder="4.5" />
          </div>
        </div>
        <div class="form-field">
          <label>Course Image/Thumbnail</label>
          <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
            <input id="fImage" type="file" accept="image/*" style="flex: 1;" />
            <button type="button" onclick="openImageEditor()" style="background: linear-gradient(135deg, #8b5cf6, #6366f1); color: white; border: none; padding: 0.6rem 1rem; border-radius: 8px; font-weight: 600; cursor: pointer;">🎨 Editor</button>
          </div>
          <small style="color: var(--text-light); display: block; margin-bottom: 0.5rem;">Or upload JPG, PNG (recommended: 400x300px)</small>
          <div style="background: var(--bg-secondary); padding: 0.8rem; border-radius: 8px; margin-bottom: 0.5rem; border: 1px solid var(--border-color);">
            <small style="color: var(--text-light);">📁 Current Path:</small>
            <div id="imagePath" style="color: var(--primary-color); font-weight: 600; font-size: 0.9rem; word-break: break-all; margin-top: 0.3rem;">None</div>
          </div>
          <div id="imagePreview" style="margin-top: 0.5rem; max-width: 200px; border: 1px solid var(--border-color); border-radius: 8px; padding: 0.5rem; background: var(--bg-secondary);"></div>
        </div>
      </div>

      <!-- Tab 2: Syllabus & Career Paths -->
      <div class="tab-pane" id="tab-syllabus">
        <div class="form-field">
          <label>Short Description *</label>
          <input id="fDesc" placeholder="One-line summary shown on cards" />
        </div>
        <div class="form-field">
          <label>Full Description</label>
          <textarea id="fFullDesc" rows="3" placeholder="Detailed course overview…"></textarea>
        </div>
        <div class="form-field">
          <label>Skills Gained (comma-separated)</label>
          <input id="fSkills" placeholder="HTML, CSS, JavaScript, Git" />
        </div>
        <div class="form-field">
          <label>Curriculum Topics (comma-separated)</label>
          <input id="fTopics" placeholder="HTML Basics, CSS Layouts, DOM…" />
        </div>
        <div class="form-field">
          <label>Career Paths (comma-separated)</label>
          <input id="fCareers" placeholder="Frontend Dev, Full Stack Dev…" />
        </div>
      </div>

      <!-- Tab 3: JSON Configurations -->
      <div class="tab-pane" id="tab-json">
        <div class="form-field">
          <div class="json-control-row">
            <label>Roadmap Stages (JSON Format)</label>
            <button type="button" class="btn" style="padding: 0.25rem 0.6rem; font-size: 0.75rem; background: var(--bg-secondary); border: 1px solid var(--border-color); color: var(--text-dark);" onclick="formatJSONField('fRoadmap')">✨ Format</button>
          </div>
          <textarea id="fRoadmap" rows="6" class="json-editor" placeholder='[{"icon": "🌱", "stage": "Beginner", "duration": "Weeks 1-4", "topics": ["HTML"], "tools": ["VS Code"], "outcome": "Learn HTML"}]'></textarea>
          <div id="roadmapValMsg" class="json-validation-msg"></div>
        </div>
        <div class="form-field">
          <div class="json-control-row">
            <label>Career Growth Opportunities (JSON Format)</label>
            <button type="button" class="btn" style="padding: 0.25rem 0.6rem; font-size: 0.75rem; background: var(--bg-secondary); border: 1px solid var(--border-color); color: var(--text-dark);" onclick="formatJSONField('fOpportunities')">✨ Format</button>
          </div>
          <textarea id="fOpportunities" rows="6" class="json-editor" placeholder='{"growthPaths": [{"title": "Web Developer", "salary": "$80K - $120K", "demand": "High", "skills": ["HTML"], "growth": "Dev -> Senior"}], "industryInsights": ["Market is growing"]}'></textarea>
          <div id="opportunitiesValMsg" class="json-validation-msg"></div>
        </div>
      </div>

      <!-- Modal Footer actions -->
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" id="btnSaveCourse" onclick="saveCourse()">💾 Save Course</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-container">
      <div class="footer-section"><h4>SkillBridge</h4></div>
    </div>
    <div class="footer-bottom"><p>&copy; 2026 SkillBridge.</p></div>
  </footer>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script>
    let activeCoursesList = [];
    
    // ── Local Store helpers ──────────────────────────────────────
    function getCustomCourses() {
      return JSON.parse(localStorage.getItem('customCourses') || 'null');
    }
    function saveCustomCourses(arr) {
      localStorage.setItem('customCourses', JSON.stringify(arr));
      localStorage.setItem('coursesData', JSON.stringify(arr));
    }
    function getAllCourses() {
      return getCustomCourses() || coursesData;
    }

    // ── Tab Switching ────────────────────────────────────────────
    function switchEditorTab(tabId) {
      document.querySelectorAll('.modal-tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));

      if (tabId === 'tab-basic') {
        document.getElementById('btnTabBasic').classList.add('active');
      } else if (tabId === 'tab-syllabus') {
        document.getElementById('btnTabSyllabus').classList.add('active');
      } else {
        document.getElementById('btnTabJSON').classList.add('active');
      }
      document.getElementById(tabId).classList.add('active');
    }

    // ── Dynamically Populate Categories Dropdown ───────────────────
    function populateCategoriesFilter(courses) {
      const catSelect = document.getElementById('categoryFilter');
      const uniqueCategories = [...new Set(courses.map(c => c.category || 'Other'))];
      
      catSelect.innerHTML = `<option value="all">All Categories</option>` +
        uniqueCategories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
    }

    // ── Render Statistics & Table ─────────────────────────────────
    function renderTable() {
      requireRole('admin');
      const courses = getAllCourses();
      activeCoursesList = courses;
      const completed = JSON.parse(localStorage.getItem('completedCourses') || '[]');
      const certs = JSON.parse(localStorage.getItem('certificates') || '[]');

      // Dynamically populate categories dropdown if empty or first load
      populateCategoriesFilter(courses);

      // Calculations for metrics
      const totalComp = completed.length;
      const avgRating = courses.length ? (courses.reduce((s,c)=>s+(+c.rating||0),0)/courses.length).toFixed(1) : 0;

      // Extract dynamic stats
      const compMap = completed.reduce((a,c)=>{ a[String(c.id)]=(a[String(c.id)]||0)+1; return a; },{});
      certs.forEach(cert => {
        if(cert.courseId) {
          compMap[String(cert.courseId)] = (compMap[String(cert.courseId)] || 0) + 1;
        }
      });

      let mostPopularCourse = 'None';
      let maxCompletions = 0;
      courses.forEach(c => {
        const completions = compMap[String(c.id)] || 0;
        if (completions > maxCompletions) {
          maxCompletions = completions;
          mostPopularCourse = c.title;
        }
      });

      const categoryCounts = {};
      courses.forEach(c => {
        const cat = c.category || 'Other';
        categoryCounts[cat] = (categoryCounts[cat] || 0) + 1;
      });
      let leadingCategory = 'None';
      let maxCatCount = 0;
      for (const cat in categoryCounts) {
        if (categoryCounts[cat] > maxCatCount) {
          maxCatCount = categoryCounts[cat];
          leadingCategory = cat;
        }
      }

      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card">
          <div>
            <div class="stat-val">${courses.length}</div>
            <div class="stat-lbl">Active Courses</div>
          </div>
          <span class="stat-icon">📚</span>
        </div>
        <div class="stat-card" style="border-left-color:#10b981;">
          <div>
            <div class="stat-val" style="color:#10b981;">${totalComp}</div>
            <div class="stat-lbl">Completions</div>
          </div>
          <span class="stat-icon" style="color:#10b981;">🏆</span>
        </div>
        <div class="stat-card" style="border-left-color:#f59e0b;">
          <div>
            <div class="stat-val" style="color:#f59e0b;">⭐ ${avgRating}</div>
            <div class="stat-lbl">Avg Rating</div>
          </div>
          <span class="stat-icon" style="color:#f59e0b;">📈</span>
        </div>
        <div class="stat-card" style="border-left-color:#8b5cf6;">
          <div>
            <div class="stat-val" style="color:#8b5cf6; font-size: 1.1rem; font-weight: 800; overflow:hidden; text-overflow:ellipsis; max-width:180px; white-space:nowrap;" title="${mostPopularCourse}">${mostPopularCourse}</div>
            <div class="stat-lbl">Most Popular</div>
          </div>
          <span class="stat-icon" style="color:#8b5cf6;">🔥</span>
        </div>
        <div class="stat-card" style="border-left-color:#ec4899;">
          <div>
            <div class="stat-val" style="color:#ec4899; font-size: 1.2rem; font-weight: 800;">${leadingCategory}</div>
            <div class="stat-lbl">Top Category</div>
          </div>
          <span class="stat-icon" style="color:#ec4899;">💡</span>
        </div>
      `;

      filterCourses();
    }

    // ── Searching, Filtering, Sorting ──────────────────────────────
    function filterCourses() {
      const search = (document.getElementById('searchInput').value || '').toLowerCase();
      const cat = document.getElementById('categoryFilter').value;
      const level = document.getElementById('levelFilter').value;
      const sortBy = document.getElementById('sortSelect').value;

      const completed = JSON.parse(localStorage.getItem('completedCourses') || '[]');
      const certs = JSON.parse(localStorage.getItem('certificates') || '[]');
      const compMap = completed.reduce((a,c)=>{ a[String(c.id)]=(a[String(c.id)]||0)+1; return a; },{});
      certs.forEach(cert => {
        if(cert.courseId) {
          compMap[String(cert.courseId)] = (compMap[String(cert.courseId)] || 0) + 1;
        }
      });

      // 1. Filter courses
      let filtered = activeCoursesList.filter(c => {
        const titleMatch = (c.title || '').toLowerCase().includes(search) || 
                           (c.category || '').toLowerCase().includes(search) || 
                           (c.description || '').toLowerCase().includes(search);
        
        const catMatch = cat === 'all' || c.category === cat;
        const lvlMatch = level === 'all' || c.level === level;

        return titleMatch && catMatch && lvlMatch;
      });

      // 2. Sort courses
      filtered.sort((a, b) => {
        if (sortBy === 'titleAsc') {
          return (a.title || '').localeCompare(b.title || '');
        } else if (sortBy === 'titleDesc') {
          return (b.title || '').localeCompare(a.title || '');
        } else if (sortBy === 'ratingHigh') {
          return (parseFloat(b.rating) || 0) - (parseFloat(a.rating) || 0);
        } else if (sortBy === 'compHigh') {
          const compA = compMap[String(a.id)] || 0;
          const compB = compMap[String(b.id)] || 0;
          return compB - compA;
        }
        return 0;
      });

      // 3. Render table body
      const tbody = document.getElementById('coursesTbody');
      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="empty-state">No courses found matching filters.</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(c => `
        <tr>
          <td style="font-size:1.6rem;">${c.icon||'📖'}</td>
          <td style="font-weight:700; color: var(--text-dark);">${c.title}</td>
          <td><span class="tag">${c.category||'-'}</span></td>
          <td>${c.level||'-'}</td>
          <td>${c.duration||'-'}</td>
          <td>⭐ ${c.rating||'-'}</td>
          <td style="text-align:center;font-weight:800;color:var(--primary-color);">${compMap[String(c.id)]||0}</td>
          <td style="text-align:center;white-space:nowrap;">
            <div style="display: flex; gap: 0.35rem; justify-content: center;">
              <button class="btn-edit" onclick="openEditModal(${c.id})">✏️ Edit</button>
              <button class="btn-del" onclick="deleteCourse(${c.id})">🗑 Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // ── JSON formatting & validation ──────────────────────────────
    function validateJSONField(id, valMsgId) {
      const textarea = document.getElementById(id);
      const valMsg = document.getElementById(valMsgId);
      const text = textarea.value.trim();

      if (!text) {
        valMsg.textContent = '';
        return true;
      }

      try {
        JSON.parse(text);
        valMsg.textContent = '✅ Valid JSON';
        valMsg.style.color = '#10b981';
        return true;
      } catch (e) {
        valMsg.textContent = '❌ Invalid JSON: ' + e.message;
        valMsg.style.color = '#ef4444';
        return false;
      }
    }

    function checkAllJSONValid() {
      const rValid = validateJSONField('fRoadmap', 'roadmapValMsg');
      const oValid = validateJSONField('fOpportunities', 'opportunitiesValMsg');
      
      const saveBtn = document.getElementById('btnSaveCourse');
      const alertBox = document.getElementById('modalAlert');

      if (!rValid || !oValid) {
        saveBtn.disabled = true;
        alertBox.textContent = '⚠️ Please fix the formatting errors in the JSON tab before saving.';
        alertBox.style.display = 'block';
      } else {
        saveBtn.disabled = false;
        alertBox.style.display = 'none';
      }
    }

    function formatJSONField(id) {
      const textarea = document.getElementById(id);
      try {
        const parsed = JSON.parse(textarea.value);
        textarea.value = JSON.stringify(parsed, null, 2);
        checkAllJSONValid();
        showToast('✨ formatted JSON successfully.');
      } catch (e) {
        alert('⚠️ Unable to format. JSON is invalid: ' + e.message);
      }
    }

    // Register event listeners for JSON textareas
    document.getElementById('fRoadmap').addEventListener('input', checkAllJSONValid);
    document.getElementById('fOpportunities').addEventListener('input', checkAllJSONValid);

    // ── Add/Edit Modals ──────────────────────────────────────────
    let editingCourseId = null;

    function openAddModal() {
      editingCourseId = null;
      document.getElementById('modalTitle').textContent = '➕ Add New Course';
      document.getElementById('editingId').value = '';
      ['fTitle','fIcon','fCategory','fDuration','fDesc','fFullDesc','fSkills','fTopics','fCareers'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('fRating').value = '4.5';
      document.getElementById('fLevel').value = 'Beginner';
      document.getElementById('fImage').value = '';
      document.getElementById('imagePreview').innerHTML = '';
      document.getElementById('imagePath').textContent = 'None';
      
      // Default configurations
      const defaultRoadmap = [
        { "icon": "🌱", "stage": "Beginner", "duration": "Weeks 1-4", "topics": ["Topic 1", "Topic 2"], "tools": ["Tool 1"], "outcome": "Outcome description" },
        { "icon": "📚", "stage": "Fundamentals", "duration": "Weeks 5-8", "topics": ["Topic 1"], "tools": ["Tool 1"], "outcome": "Outcome description" },
        { "icon": "🔨", "stage": "Projects", "duration": "Weeks 9-10", "topics": ["Topic 1"], "tools": ["Tool 1"], "outcome": "Outcome description" }
      ];
      document.getElementById('fRoadmap').value = JSON.stringify(defaultRoadmap, null, 2);

      const defaultOpportunities = {
        "growthPaths": [
          { "title": "Job Title", "salary": "$70K - $110K", "demand": "High", "skills": ["Skill 1", "Skill 2"], "growth": "Junior -> Senior" }
        ],
        "industryInsights": [
          "Insights summary..."
        ]
      };
      document.getElementById('fOpportunities').value = JSON.stringify(defaultOpportunities, null, 2);

      // Check validation
      checkAllJSONValid();

      // Reset to first tab
      switchEditorTab('tab-basic');

      document.getElementById('courseModal').classList.add('open');
    }

    function openEditModal(courseId) {
      editingCourseId = courseId;
      const courses = getAllCourses();
      const c = courses.find(x=>x.id===courseId);
      if (!c) return;

      document.getElementById('modalTitle').textContent = '✏️ Edit Course';
      document.getElementById('editingId').value = courseId;
      document.getElementById('fTitle').value = c.title||'';
      document.getElementById('fIcon').value = c.icon||'';
      document.getElementById('fCategory').value = c.category||'';
      document.getElementById('fLevel').value = c.level||'Beginner';
      document.getElementById('fDuration').value = c.duration||'';
      document.getElementById('fRating').value = c.rating||'';
      document.getElementById('fDesc').value = c.description||'';
      document.getElementById('fFullDesc').value = c.fullDescription||'';
      document.getElementById('fSkills').value = (c.skillsGained||[]).join(', ');
      document.getElementById('fTopics').value = (c.curriculumTopics||[]).join(', ');
      document.getElementById('fCareers').value = (c.careerPaths||[]).join(', ');
      document.getElementById('fImage').value = '';
      
      // Image path preview
      if (c.image) {
        document.getElementById('imagePath').textContent = c.image.substring(0, 80) + (c.image.length > 80 ? '...' : '');
        const imagePath = c.image.startsWith('data:') || c.image.startsWith('../') ? c.image : '../' + c.image;
        document.getElementById('imagePreview').innerHTML = `<img src="${imagePath}" alt="${c.title}" style="width: 100%; border-radius: 6px; border: 1.5px solid var(--border-color);">`;
      } else {
        document.getElementById('imagePath').textContent = 'None';
        document.getElementById('imagePreview').innerHTML = '';
      }
      
      // Load Roadmap JSON
      const roadmapData = courseRoadmapData && courseRoadmapData[courseId] ? courseRoadmapData[courseId].stages : [];
      document.getElementById('fRoadmap').value = JSON.stringify(roadmapData, null, 2);

      // Load Opportunities JSON
      const opportunitiesData = futureOpportunitiesData && futureOpportunitiesData[courseId] ? futureOpportunitiesData[courseId] : { growthPaths: [], industryInsights: [] };
      document.getElementById('fOpportunities').value = JSON.stringify(opportunitiesData, null, 2);

      // Reset to first tab
      switchEditorTab('tab-basic');

      // Check validation
      checkAllJSONValid();

      document.getElementById('courseModal').classList.add('open');
    }

    function openImageEditor() {
      if (!editingCourseId) {
        alert('Please save the course first before using the image editor.');
        return;
      }
      window.location.href = `image-editor.html?courseId=${editingCourseId}`;
    }

    function closeModal() {
      document.getElementById('courseModal').classList.remove('open');
    }

    function saveCourse() {
      const title = document.getElementById('fTitle').value.trim();
      if (!title) { alert('Title is required.'); return; }

      // Validate JSON files again just to be safe
      const rValid = validateJSONField('fRoadmap', 'roadmapValMsg');
      const oValid = validateJSONField('fOpportunities', 'opportunitiesValMsg');
      if(!rValid || !oValid) {
        alert('⚠️ Cannot save: JSON configurations are invalid. Please check the JSON tab.');
        return;
      }

      const fileInput = document.getElementById('fImage');
      const file = fileInput.files[0];

      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          saveCoursewithImage(e.target.result);
        };
        reader.readAsDataURL(file);
      } else {
        saveCoursewithImage(null);
      }
    }

    function saveCoursewithImage(imageData) {
      const title = document.getElementById('fTitle').value.trim();
      let courses = getAllCourses();
      const editingId = document.getElementById('editingId').value;
      const isEdit = !!editingId;

      const course = {
        id: isEdit ? parseInt(editingId) : (Date.now()),
        title,
        icon:        document.getElementById('fIcon').value.trim() || '📖',
        category:    document.getElementById('fCategory').value.trim() || 'General',
        level:       document.getElementById('fLevel').value,
        duration:    document.getElementById('fDuration').value.trim() || 'Self-paced',
        rating:      parseFloat(document.getElementById('fRating').value) || 4.5,
        description: document.getElementById('fDesc').value.trim() || 'No description provided.',
        fullDescription: document.getElementById('fFullDesc').value.trim() || '',
        students:    isEdit ? (courses.find(c => c.id === parseInt(editingId))?.students || '0') : '0',
        courseDuration: document.getElementById('fDuration').value.trim(),
        prerequisites: [],
        skillsGained:   splitCSV(document.getElementById('fSkills').value),
        curriculumTopics: splitCSV(document.getElementById('fTopics').value),
        careerPaths:  splitCSV(document.getElementById('fCareers').value),
      };

      if (imageData) {
        course.image = imageData;
      } else if (isEdit) {
        const existing = courses.find(c => c.id === parseInt(editingId));
        if (existing && existing.image) {
          course.image = existing.image;
        }
      }

      if (isEdit) {
        const idx = courses.findIndex(c=>c.id===parseInt(editingId));
        if (idx !== -1) courses[idx] = course;
      } else {
        courses.push(course);
      }

      // Save Roadmap
      try {
        const stages = JSON.parse(document.getElementById('fRoadmap').value);
        courseRoadmapData[course.id] = { stages };
        localStorage.setItem('courseRoadmapData', JSON.stringify(courseRoadmapData));
      } catch (e) {}

      // Save Opportunities
      try {
        const opportunities = JSON.parse(document.getElementById('fOpportunities').value);
        futureOpportunitiesData[course.id] = opportunities;
        localStorage.setItem('futureOpportunitiesData', JSON.stringify(futureOpportunitiesData));
      } catch (e) {}

      saveCustomCourses(courses);
      closeModal();
      renderTable();
      showToast(isEdit ? '✅ Course updated!' : '✅ Course added!');
    }

    function deleteCourse(courseId) {
      if (!confirm('Are you sure you want to delete this course? This will remove all curriculum records.')) return;
      let courses = getAllCourses();
      courses = courses.filter(c=>c.id!==courseId);
      saveCustomCourses(courses);
      renderTable();
      showToast('🗑 Course deleted.');
    }

    function splitCSV(str) {
      return str.split(',').map(s=>s.trim()).filter(Boolean);
    }

    function showToast(msg) {
      const el = document.createElement('div');
      el.textContent = msg;
      el.style.cssText = 'position:fixed;bottom:2rem;right:2rem;background:#10b981;color:#fff;padding:.75rem 1.5rem;border-radius:10px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:9999;animation:fadeIn .3s;';
      document.body.appendChild(el);
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 2500);
    }

    document.getElementById('courseModal').addEventListener('click', function(e){
      if (e.target === this) closeModal();
    });

    // Image preview updates
    document.getElementById('fImage').addEventListener('change', function(e) {
      const file = e.target.files[0];
      const preview = document.getElementById('imagePreview');
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          preview.innerHTML = `<img src="${e.target.result}" alt="Preview" style="width: 100%; border-radius: 8px; border: 1.5px solid var(--primary-color);">`;
        };
        reader.readAsDataURL(file);
      } else {
        preview.innerHTML = '';
      }
    });

    document.addEventListener('DOMContentLoaded', renderTable);
  </script>
</body>
</html>
