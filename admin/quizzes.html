<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Manage Quizzes | SkillBridge</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    .admin-table { width:100%; border-collapse:collapse; background:var(--card-bg); border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,.08); }
    .admin-table th { background:linear-gradient(135deg,var(--primary-color),var(--secondary-color)); color:#fff; padding:1rem 1.2rem; text-align:left; font-size:.9rem; }
    .admin-table td { padding:.9rem 1.2rem; border-bottom:1px solid var(--border-color); color:var(--text-dark); vertical-align:top; }
    .admin-table tr:last-child td { border-bottom:none; }
    .btn-edit { background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; border:none; padding:.4rem .9rem; border-radius:8px; cursor:pointer; font-size:.85rem; font-weight:600; }
    .btn-del  { background:linear-gradient(135deg,#ef4444,#dc2626); color:#fff; border:none; padding:.4rem .9rem; border-radius:8px; cursor:pointer; font-size:.85rem; font-weight:600; margin-left:.5rem; }
    .btn-add-q { background:linear-gradient(135deg,#10b981,#059669); color:#fff; border:none; padding:.35rem .8rem; border-radius:8px; cursor:pointer; font-size:.8rem; font-weight:600; }
    .btn-edit:hover,.btn-del:hover,.btn-add-q:hover { opacity:.85; }
    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); z-index:1000; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--card-bg); border-radius:16px; padding:2rem; width:min(720px,95vw); max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.3); }
    .modal-box h2 { margin-bottom:1.5rem; font-size:1.3rem; background:linear-gradient(135deg,var(--primary-color),var(--secondary-color)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .form-field { display:flex; flex-direction:column; gap:.4rem; margin-bottom:1rem; }
    .form-field label { font-size:.85rem; font-weight:700; color:var(--text-light); text-transform:uppercase; }
    .form-field input,.form-field select,.form-field textarea { background:var(--bg-secondary,#f8fafc); border:1.5px solid var(--border-color); border-radius:8px; padding:.6rem .9rem; color:var(--text-dark); font-size:.9rem; outline:none; }
    .form-field input:focus,.form-field select:focus,.form-field textarea:focus { border-color:var(--primary-color); }
    .question-block { border:1.5px solid var(--border-color); border-radius:10px; padding:1rem; margin-bottom:1rem; position:relative; background:rgba(99,102,241,.03); }
    .question-block h4 { margin-bottom:.75rem; font-size:.95rem; color:var(--primary-color); }
    .opt-row { display:grid; grid-template-columns:1fr auto; gap:.5rem; align-items:center; margin-bottom:.4rem; }
    .opt-row input { font-size:.9rem; }
    .correct-label { font-size:.8rem; font-weight:700; color:#10b981; }
    .remove-q { position:absolute; top:.6rem; right:.75rem; background:none; border:none; color:#ef4444; font-size:1.1rem; cursor:pointer; }
    .modal-actions { display:flex; gap:1rem; justify-content:flex-end; margin-top:1.5rem; }
    .btn-save   { background:linear-gradient(135deg,#10b981,#059669); color:#fff; border:none; padding:.6rem 1.5rem; border-radius:10px; font-weight:700; cursor:pointer; }
    .btn-cancel { background:rgba(100,100,100,.15); color:var(--text-dark); border:none; padding:.6rem 1.5rem; border-radius:10px; font-weight:700; cursor:pointer; }
    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem; margin-bottom:2rem; }
    .stat-card { background:var(--card-bg); border-radius:12px; padding:1.2rem 1.5rem; border-left:4px solid var(--primary-color); box-shadow:0 2px 10px rgba(0,0,0,.06); }
    .stat-val { font-size:2rem; font-weight:800; color:var(--primary-color); }
    .stat-lbl { font-size:.85rem; color:var(--text-light); margin-top:.2rem; }
    .attempts-section { margin-top:3rem; }
    .pass { color:#10b981; font-weight:700; }
    .fail { color:#f59e0b; font-weight:700; }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a href="../index.html" class="logo">SkillBridge</a>
      <ul class="nav-links"></ul>
      <div class="hamburger"><span></span><span></span><span></span></div>
    </div>
  </nav>

  <section class="section" style="padding:2.5rem 1rem;">
    <div class="container" style="max-width:1200px;">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;">
        <h1 class="section-title" style="margin:0;">📝 Manage Quizzes</h1>
        <button class="btn btn-primary" onclick="openAddQuizModal()" style="padding:.6rem 1.4rem;font-weight:700;">+ Add New Quiz</button>
      </div>

      <div class="stats-row" id="statsRow"></div>

      <!-- Quiz list per course -->
      <h2 style="margin-bottom:1rem;font-size:1.2rem;color:var(--text-dark);">📋 Quizzes by Course</h2>
      <div style="overflow-x:auto;">
        <table class="admin-table">
          <thead><tr><th>Course</th><th>Questions</th><th>Pass Score</th><th style="text-align:center;">Actions</th></tr></thead>
          <tbody id="quizListTbody"></tbody>
        </table>
      </div>

      <!-- Attempts log -->
      <div class="attempts-section">
        <h2 style="margin-bottom:1rem;font-size:1.2rem;color:var(--text-dark);">📊 Student Quiz Attempts</h2>
        <div style="overflow-x:auto;">
          <table class="admin-table">
            <thead><tr><th>Student</th><th>Course</th><th>Score</th><th>%</th><th>Result</th><th>Date</th></tr></thead>
            <tbody id="attemptsTbody"></tbody>
          </table>
        </div>
        <button class="btn-del" onclick="clearAttempts()" style="margin-top:1rem;padding:.5rem 1.2rem;">🗑 Clear All Attempts</button>
      </div>
    </div>
  </section>

  <!-- Quiz Add/Edit Modal -->
  <div class="modal-overlay" id="quizModal">
    <div class="modal-box">
      <h2 id="quizModalTitle">Add Quiz</h2>
      <input type="hidden" id="editingCourseId" value="" />
      <div class="form-field">
        <label>Course *</label>
        <select id="qCourse"></select>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;">
        <strong style="color:var(--text-dark);">Questions</strong>
        <button class="btn-add-q" onclick="addQuestionBlock()">+ Add Question</button>
      </div>
      <div id="questionsContainer"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeQuizModal()">Cancel</button>
        <button class="btn-save" onclick="saveQuiz()">💾 Save Quiz</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-container"><div class="footer-section"><h4>SkillBridge</h4></div></div>
    <div class="footer-bottom"><p>&copy; 2026 SkillBridge.</p></div>
  </footer>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script>
    function getCustomQuizzes() { return JSON.parse(localStorage.getItem('customQuizzes') || 'null'); }
    function saveCustomQuizzes(obj) { localStorage.setItem('customQuizzes', JSON.stringify(obj)); }
    function getAllQuizzes() { return getCustomQuizzes() || quizData; }
    function getAllCourses() { return JSON.parse(localStorage.getItem('customCourses') || 'null') || coursesData; }

    // ── Render quiz list ─────────────────────────────────────────
    function renderPage() {
      requireRole('admin');
      const quizzes  = getAllQuizzes();
      const courses  = getAllCourses();
      const attempts = JSON.parse(localStorage.getItem('quizScores') || '[]');

      // Stats
      const totalQ = Object.values(quizzes).reduce((s,q)=>s+(q.questions||[]).length,0);
      const avgPct = attempts.length ? Math.round(attempts.reduce((s,a)=>s+a.percentage,0)/attempts.length) : 0;
      const passed = attempts.filter(a=>a.percentage>=70).length;
      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card"><div class="stat-val">${Object.keys(quizzes).length}</div><div class="stat-lbl">Quizzes</div></div>
        <div class="stat-card" style="border-left-color:#f59e0b;"><div class="stat-val" style="color:#f59e0b;">${totalQ}</div><div class="stat-lbl">Total Questions</div></div>
        <div class="stat-card" style="border-left-color:#10b981;"><div class="stat-val" style="color:#10b981;">${attempts.length}</div><div class="stat-lbl">Total Attempts</div></div>
        <div class="stat-card" style="border-left-color:#6366f1;"><div class="stat-val" style="color:#6366f1;">${avgPct}%</div><div class="stat-lbl">Avg Score</div></div>
      `;

      // Quiz list
      const tbody = document.getElementById('quizListTbody');
      const courseMap = Object.fromEntries(courses.map(c=>[String(c.id),c]));
      const rows = Object.entries(quizzes).map(([cid,q])=>{
        const c = courseMap[String(cid)];
        return `
          <tr>
            <td style="font-weight:700;">${c ? c.icon+' '+c.title : 'Course #'+cid}</td>
            <td>${(q.questions||[]).length} questions</td>
            <td>70%</td>
            <td style="text-align:center;white-space:nowrap;">
              <button class="btn-edit" onclick="openEditQuizModal(${cid})">✏️ Edit</button>
              <button class="btn-del"  onclick="deleteQuiz(${cid})">🗑 Delete</button>
            </td>
          </tr>
        `;
      });
      tbody.innerHTML = rows.length ? rows.join('') : `<tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--text-light);">No quizzes yet.</td></tr>`;

      // Attempts
      const attBody = document.getElementById('attemptsTbody');
      if (!attempts.length) {
        attBody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-light);">No attempts yet.</td></tr>`;
      } else {
        attBody.innerHTML = attempts.slice().reverse().map(a=>{
          const cn = courses.find(c=>String(c.id)===String(a.courseId))?.title || 'Course #'+a.courseId;
          const cls = a.percentage>=70?'pass':'fail';
          const studentName = a.studentName || 'Unknown';
          return `<tr>
            <td style="font-weight:600;">${studentName}</td>
            <td>${cn}</td>
            <td>${a.score}/${a.total}</td>
            <td class="${cls}">${a.percentage}%</td>
            <td class="${cls}">${a.percentage>=70?'✅ Pass':'⚠️ Fail'}</td>
            <td style="font-size:.85rem;color:var(--text-light);">${a.date||'-'}</td>
          </tr>`;
        }).join('');
      }

      // Populate course select
      const sel = document.getElementById('qCourse');
      sel.innerHTML = courses.map(c=>`<option value="${c.id}">${c.icon||''} ${c.title}</option>`).join('');
    }

    // ── Add/Edit Quiz Modal ───────────────────────────────────────
    let questionCount = 0;

    function openAddQuizModal() {
      document.getElementById('quizModalTitle').textContent = '➕ Add Quiz';
      document.getElementById('editingCourseId').value = '';
      const courseSelect = document.getElementById('qCourse');
      courseSelect.disabled = false;
      document.getElementById('questionsContainer').innerHTML = '';
      questionCount = 0;
      addQuestionBlock();
      document.getElementById('quizModal').classList.add('open');
    }

    function openEditQuizModal(courseId) {
      const quizzes = getAllQuizzes();
      const quiz = quizzes[String(courseId)];
      if (!quiz) return;
      document.getElementById('quizModalTitle').textContent = '✏️ Edit Quiz';
      document.getElementById('editingCourseId').value = courseId;
      const courseSelect = document.getElementById('qCourse');
      courseSelect.value = courseId;
      courseSelect.disabled = true;
      document.getElementById('questionsContainer').innerHTML = '';
      questionCount = 0;
      (quiz.questions||[]).forEach(q => addQuestionBlock(q));
      document.getElementById('quizModal').classList.add('open');
    }

    function closeQuizModal() {
      document.getElementById('quizModal').classList.remove('open');
      document.getElementById('qCourse').disabled = false;
    }

    function addQuestionBlock(existing) {
      const idx = questionCount++;
      const div = document.createElement('div');
      div.className = 'question-block';
      div.id = 'qblock-'+idx;
      const opts = existing?.options || ['','','',''];
      const correct = existing?.correct !== undefined ? existing.correct : 0;
      div.innerHTML = `
        <h4>Question ${idx+1}</h4>
        <button class="remove-q" onclick="this.parentElement.remove()">✕</button>
        <div class="form-field">
          <label>Question Text *</label>
          <textarea rows="2" class="q-text">${existing?.question||''}</textarea>
        </div>
        <div style="margin-bottom:.5rem;font-size:.85rem;font-weight:700;color:var(--text-light);">OPTIONS (mark correct one)</div>
        ${opts.map((o,i)=>`
          <div class="opt-row">
            <input class="q-opt" placeholder="Option ${i+1}" value="${o}" />
            <label class="correct-label" style="display:flex;align-items:center;gap:.3rem;cursor:pointer;white-space:nowrap;">
              <input type="radio" name="correct-${idx}" value="${i}" ${correct===i?'checked':''} /> Correct
            </label>
          </div>
        `).join('')}
      `;
      document.getElementById('questionsContainer').appendChild(div);
    }

    function saveQuiz() {
      const courseId = document.getElementById('editingCourseId').value || document.getElementById('qCourse').value;
      if (!courseId) { alert('Select a course.'); return; }

      const blocks = document.querySelectorAll('.question-block');
      const questions = [];
      for (const block of blocks) {
        const text = block.querySelector('.q-text').value.trim();
        if (!text) { alert('Fill in all question texts.'); return; }
        const opts = [...block.querySelectorAll('.q-opt')].map(i=>i.value.trim());
        if (opts.some(o=>!o)) { alert('Fill in all options.'); return; }
        const correctRadio = block.querySelector('input[type=radio]:checked');
        const correct = correctRadio ? parseInt(correctRadio.value) : 0;
        questions.push({ question: text, options: opts, correct });
      }

      if (!questions.length) { alert('Add at least one question.'); return; }

      const quizzes = getAllQuizzes();
      quizzes[String(courseId)] = { questions };
      saveCustomQuizzes(quizzes);
      closeQuizModal();
      renderPage();
      showToast('✅ Quiz saved!');
    }

    function deleteQuiz(courseId) {
      if (!confirm('Delete this quiz?')) return;
      const quizzes = getAllQuizzes();
      delete quizzes[String(courseId)];
      saveCustomQuizzes(quizzes);
      renderPage();
      showToast('🗑 Quiz deleted.');
    }

    function clearAttempts() {
      if (!confirm('Clear all quiz attempt records?')) return;
      localStorage.removeItem('quizScores');
      renderPage();
      showToast('🧹 Attempts cleared.');
    }

    function showToast(msg) {
      const el = document.createElement('div');
      el.textContent = msg;
      el.style.cssText = 'position:fixed;bottom:2rem;right:2rem;background:#10b981;color:#fff;padding:.75rem 1.5rem;border-radius:10px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:9999;';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 2500);
    }

    document.getElementById('quizModal').addEventListener('click',function(e){ if(e.target===this) closeQuizModal(); });
    document.addEventListener('DOMContentLoaded', renderPage);
  </script>
</body>
</html>
